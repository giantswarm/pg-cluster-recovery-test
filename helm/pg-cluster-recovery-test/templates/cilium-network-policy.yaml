apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  labels:
    {{- include "labels.common" . | nindent 4 }}
  name: {{ .Values.pgCluster.name }}
  namespace: {{ .Values.pgCluster.namespace }}
spec:
  egress:
  - toEndpoints:
    - matchExpressions:
      - key: cnpg.io/cluster
        operator: Exists
      - key: cnpg-test
        operator: In
        values: ["recovery"]
    toPorts:
    - ports:
      - port: "5432"
  - toEntities:
    - world
    - kube-apiserver
  endpointSelector:
    matchExpressions:
    - key: cnpg.io/cluster
      operator: Exists
    - key: cnpg-test
      operator: In
      values: ["recovery"]
  ingress:
  - fromEndpoints:
    - matchExpressions:
      - key: cnpg.io/cluster
        operator: Exists
      - key: cnpg-test
        operator: In
        values: ["recovery"]
    toPorts:
    - ports:
      - port: "5432"
